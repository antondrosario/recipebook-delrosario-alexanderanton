{% extends "base.html" %}
{% block page_heading %}Set New Password{% endblock %}

{% block content %}
    {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Change password">
        <a href="{% url 'password_reset' %}"> Forgot password?</a>
        <br/>
        <br/>
    {% else %}
        <p>Invalid password reset.</p>
    {% endif %}
    </form>
{% endblock %}
