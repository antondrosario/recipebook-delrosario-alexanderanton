{% extends "ledger/base.html" %}

{% block page_heading %}Recipes{% endblock %}

{% block content %}
  <ul>
    {% for recipe in recipes %}
      <li><a href="{{ recipe.get_absolute_url }}">{{ recipe.name }}</a></li>
    {% empty %}
      <li>No recipes yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
