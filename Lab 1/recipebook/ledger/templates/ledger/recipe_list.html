{% extends "ledger/base.html" %}

{% block content %}
  <h2>Recipes</h2>

  <ul>
    {% for recipe in recipes %}
      <li>
        <a href="{{ recipe.link }}">{{ recipe.name }}</a>
        <ul>
          {% for ing in recipe.ingredients %}
            <li>{{ ing.name }} — {{ ing.quantity }}</li>
          {% endfor %}
        </ul>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
